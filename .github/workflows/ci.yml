name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + dev extras)
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Types (mypy --strict)
        run: mypy src/mimir
      - name: Tests (pytest)
        run: pytest -q
      - name: Runtime self-test (the §6 acceptance loop + canary)
        run: python -m mimir.selftest
